name: Build All Examples

on:
  workflow_dispatch:  # Manual trigger only (Actions tab → Run workflow)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup template
        run: |
          mkdir -p template
          cat > template/template.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Aspose.Slides.NET" Version="26.3.0" />
            </ItemGroup>
          </Project>
          EOF
          # Strip leading whitespace from the generated csproj
          sed -i 's/^[[:space:]]*//' template/template.csproj
          echo 'class Program { static void Main() {} }' > template/Program.cs
          dotnet restore template/ --verbosity quiet
      - name: Compile all examples
        run: |
          PASS=0; FAIL=0
          find . -name '*.cs' -not -path './template/*' | sort > /tmp/cs_files.txt
          TOTAL=$(wc -l < /tmp/cs_files.txt)
          echo "Found $TOTAL examples to compile"
          echo ""
          # Start summary table
          echo "### Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r f; do
            cp "$f" template/Program.cs
            BUILD_OUTPUT=$(dotnet build template/ --no-restore --nologo 2>&1) || true
            if echo "$BUILD_OUTPUT" | grep -q "Build succeeded"; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
              # Replace "Program.cs" with the actual source filename in error output
              ERRORS=$(echo "$BUILD_OUTPUT" | grep -E "error CS|error :" | sed "s|Program\.cs|$f|g" || true)
              echo ""
              echo "::error file=$f::Build failed"
              echo "========================================="
              echo "❌ FAIL: $f"
              echo "========================================="
              echo "$ERRORS"
              echo ""
              # Add to summary
              echo "<details><summary>❌ $f</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$ERRORS" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < /tmp/cs_files.txt
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**✅ Passed: $PASS | ❌ Failed: $FAIL | Total: $TOTAL**" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "========================================="
          echo "✅ Passed: $PASS | ❌ Failed: $FAIL | Total: $TOTAL"
          echo "========================================="
          [ "$FAIL" -eq 0 ] || exit 1
